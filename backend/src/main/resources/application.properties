spring.application.name=tasf-b2b-backend
server.port=8080

# ── Rutas a los archivos de datos ─────────────────────────────────────────────
# Relativas al directorio de trabajo del JVM (raíz del proyecto al ejecutar con Maven).
# Cámbielas según la ubicación real de los archivos en tu equipo.
tasf.datos.aeropuertos=../docs/data/c.1inf54.26.1.v1.Aeropuerto.husos.v1.20250818__estudiantes.txt
tasf.datos.vuelos=../docs/data/planes_vuelo.txt
tasf.datos.envios=../docs/data/_envios_preliminar_

# ── Parámetros del algoritmo Tabu Search ──────────────────────────────────────
tasf.algoritmo.iteraciones=200
tasf.algoritmo.tenencia=30
tasf.algoritmo.muestra=200

# ── Semáforo de cumplimiento de plazos (porcentaje) ───────────────────────────
tasf.semaforo.umbral-verde=90.0
tasf.semaforo.umbral-ambar=70.0

# ── CORS ──────────────────────────────────────────────────────────────────────
tasf.cors.origins=http://localhost:5173,http://localhost:3000
